version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: mto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mto_generator
      POSTGRES_USER: mto_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mto_user -d mto_generator"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mto-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mto_user:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/mto_generator
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
