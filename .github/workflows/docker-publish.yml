name: Build & Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build each architecture on its native runner (no QEMU). Each job pushes
  # a per-arch digest, then the "merge" job combines them into a multi-arch
  # manifest. This is Docker's official recommended pattern for cross-arch
  # builds without emulation (which was crashing on `npm ci`).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/varadh8/mto_generator,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/varadh8/mto_generator
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Create manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/varadh8/mto_generator@sha256:%s ' *)

      - name: Redeploy on Portainer (non-blocking)
        continue-on-error: true
        run: |
          set +e
          curl -X PUT \
            "https://portainer.inventivebizsol.co.in/api/stacks/72/git/redeploy?endpointId=1" \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"pullImage": true, "prune": false}' \
            --fail --silent --show-error --max-time 30
          PUT_EXIT=$?
          if [ "$PUT_EXIT" -ne 0 ]; then
            echo "::warning::Portainer redeploy PUT failed (exit $PUT_EXIT); trying stop/start fallback."
            curl -X POST \
              "https://portainer.inventivebizsol.co.in/api/stacks/72/stop" \
              -H "X-API-Key: ${{ secrets.PORTAINER_API_TOKEN }}" \
              --silent --max-time 30
            curl -X POST \
              "https://portainer.inventivebizsol.co.in/api/stacks/72/start" \
              -H "X-API-Key: ${{ secrets.PORTAINER_API_TOKEN }}" \
              --silent --max-time 30
          fi
          exit 0
