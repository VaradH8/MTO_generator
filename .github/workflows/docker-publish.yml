name: Build & Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Redeploy on Portainer (non-blocking)
        # Auto-deploy is best-effort. If Portainer is unreachable (EC2 off,
        # DNS issue, etc.) we still want the workflow to pass — the image is
        # already published to GHCR and the stack can be updated manually.
        continue-on-error: true
        run: |
          set +e
          curl -X PUT \
            "https://portainer.inventivebizsol.co.in/api/stacks/72/git/redeploy?endpointId=1" \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"pullImage": true, "prune": false}' \
            --fail --silent --show-error --max-time 30
          PUT_EXIT=$?
          if [ "$PUT_EXIT" -ne 0 ]; then
            echo "::warning::Portainer redeploy PUT failed (exit $PUT_EXIT); trying stop/start fallback."
            curl -X POST \
              "https://portainer.inventivebizsol.co.in/api/stacks/72/stop" \
              -H "X-API-Key: ${{ secrets.PORTAINER_API_TOKEN }}" \
              --silent --max-time 30
            curl -X POST \
              "https://portainer.inventivebizsol.co.in/api/stacks/72/start" \
              -H "X-API-Key: ${{ secrets.PORTAINER_API_TOKEN }}" \
              --silent --max-time 30
          fi
          exit 0
